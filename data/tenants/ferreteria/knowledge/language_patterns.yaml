shorthand_dimension_patterns:
  - pattern: \b(\d+(?:[.,]\d+)?)\s*mm\b
    replacement: \1mm
  - pattern: \b(\d+)\s*x\s*(\d+)\b
    replacement: \1x\2
  - pattern: \b(\d+)\s*l\b
    replacement: \1l
  - pattern: \b(\d+)\s*ml\b
    replacement: \1ml
