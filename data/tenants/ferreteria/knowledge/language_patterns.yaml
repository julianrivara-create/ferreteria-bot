  fischer: fisher
  látex: latex
regional_terms:
  brocas: broca
  caño: cano
  drywall: durlock
  mechas: mecha
brand_generics:
  fisher: taco fisher
  fischer: taco fisher
  widia: broca widia
abbreviations:
  int: interior
  ext: exterior
  sanit: sanitaria
surface_aliases:
  chapa: chapa
  durlock: durlock
  hormigon: hormigon
  madera: madera
  metal: metal
