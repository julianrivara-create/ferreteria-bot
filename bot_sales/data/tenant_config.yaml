# Tenant Configuration
# Define la "personalidad" y contexto de negocio del bot

# Store Identity
store_name: "Ferretería"
bot_name: "Ferretero"
store_description: "Ferretería con herramientas, bulonería, pinturas y más"
store_type: "ferretería"
country: "Argentina"

# Personality & Voice
personality_style: "Argentino informal (vos, che, dale, etc.)"
emojis: "🔧 🔩 💳 ✅ 🚚"
target_audience: "Clientes de ferretería, constructores, profesionales y uso doméstico"

# Product Categories (from catalog)
product_categories:
  - General
  - Electricidad
  - Mechas y Brocas
  - Herramientas Manuales
  - Plomería
  - Puntas y Accesorios
  - Discos y Hojas
  - Tornillería y Fijaciones
  - Pinturas y Acabados
  - Cintas y Adhesivos
  - Herramientas Eléctricas
  - Lijas y Abrasivos
  - Seguridad

# Cross-sell Rules
# Cuando el cliente compra de la categoría X, ofrecer productos de la categoría Y
cross_sell_rules:
  - source_category: Herramientas Eléctricas
    target_category: Discos y Hojas
    discount_percent: 5
    reason: "para tu herramienta eléctrica"

  - source_category: Tornillería y Fijaciones
    target_category: Puntas y Accesorios
    discount_percent: 5
    reason: "para complementar tu fijación"

  - source_category: Pinturas y Acabados
    target_category: Lijas y Abrasivos
    discount_percent: 5
    reason: "para la preparación de superficie"

  - source_category: Plomería
    target_category: Tornillería y Fijaciones
    discount_percent: 5
    reason: "para el montaje"

# Comparison Feature Keys (attributes to compare for this store)
comparison_features:
  - category
  - proveedor
  - price_ars
  - sku

# Business Rules
enable_upselling: true
enable_crossselling: true
enable_bundles: true
hold_minutes: 1440  # 24 horas hábiles

# Validation Rules
required_reservation_fields:
  - nombre
  - contacto

# Anti-hallucination: Placeholder Detection
placeholder_names:
  - "juan"
  - "juan perez"
  - "ejemplo"
  - "usuario"
  - "cliente"
  - "example"
  - "test"

placeholder_phones:
  - "123456"
  - "1111111"
  - "0000000"

placeholder_emails:
  - "ejemplo"
  - "test"
  - "@test"
  - "@example"
