<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Salesbot Store</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="styles/enhancements.css">
    <link rel="stylesheet" href="styles/checkout.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <a id="checkout-home-link" href="index.html"><span data-store-name>Salesbot Store</span></a>
            </div>
            <div class="nav-links">
                <a id="checkout-continue-link" href="index.html">Seguir Comprando</a>
            </div>
        </div>
    </nav>

    <div class="checkout-container">
        <!-- Forms Column -->
        <div class="checkout-forms">

            <!-- Contact Info -->
            <section class="checkout-section">
                <h2>Información de Contacto</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required placeholder="tu@email.com" id="email">
                    </div>
                </form>
            </section>

            <!-- Shipping Info -->
            <section class="checkout-section">
                <h2>Dirección de Envío</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" required id="firstName">
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" required id="lastName">
                    </div>
                </div>
                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" required placeholder="Calle y número" id="address">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ciudad</label>
                        <input type="text" required id="city">
                    </div>
                    <div class="form-group">
                        <label>Código Postal</label>
                        <input type="text" required id="zip">
                    </div>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" required placeholder="+54 9 11..." id="phone">
                </div>
            </section>

            <!-- Payment Method -->
            <section class="checkout-section">
                <h2>Método de Pago</h2>
                <div class="payment-methods">
                    <div class="payment-option selected" onclick="selectPayment('credit')">
                        <div class="payment-icon"></div>
                        <div>
                            <strong>Tarjeta de Crédito / Débito</strong>
                            <p style="font-size: 13px; color: #666; margin: 0;">Procesado seguro vía Stripe/MercadoPago
                            </p>
                        </div>
                    </div>

                    <div class="payment-option" onclick="selectPayment('mercadopago')">
                        <div class="payment-icon"></div>
                        <div>
                            <strong>Mercado Pago</strong>
                            <p style="font-size: 13px; color: #666; margin: 0;">Dinero en cuenta o QR</p>
                        </div>
                    </div>

                    <div class="payment-option" onclick="selectPayment('transfer')">
                        <div class="payment-icon"></div>
                        <div>
                            <strong>Transferencia Bancaria</strong>
                            <p style="font-size: 13px; color: #666; margin: 0;">10% de descuento adicional</p>
                        </div>
                    </div>
                </div>
            </section>

        </div>

        <!-- Order Summary Column -->
        <div class="checkout-sidebar">
            <div class="order-summary">
                <h2>Resumen</h2>
                <div class="summary-items" id="summary-items-container">
                    <!-- Items injected by JS -->
                </div>

                <div class="summary-totals">
                    <div class="total-row">
                        <span>Subtotal</span>
                        <span id="summary-subtotal">$0</span>
                    </div>
                    <div class="total-row">
                        <span>Envío</span>
                        <span>Gratis</span>
                    </div>
                    <div class="total-row final">
                        <span>Total</span>
                        <span id="summary-total">$0</span>
                    </div>
                </div>

                <button class="place-order-btn" onclick="handlePlaceOrder()">Confirmar Pago</button>
            </div>
        </div>
    </div>

    <script src="scripts/cart.js"></script>
    <script src="scripts/checkout.js"></script>
    <script>
        (async function () {
            const params = new URLSearchParams(window.location.search);
            const tenant = params.get('tenant') || window.__TENANT_SLUG || 'default';
            const homeHref = `index.html?tenant=${encodeURIComponent(tenant)}`;

            const home = document.getElementById('checkout-home-link');
            const cont = document.getElementById('checkout-continue-link');
            if (home) home.href = homeHref;
            if (cont) cont.href = homeHref;

            async function fetchBranding() {
                try {
                    const resp = await fetch(`/api/storefront?tenant=${tenant}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        const branding = data.branding || {};
                        const storeName = branding.store_name || 'Salesbot Store';
                        document.title = `Checkout | ${storeName}`;
                        document.querySelectorAll('[data-store-name]').forEach((el) => {
                            el.textContent = storeName;
                        });
                    }
                } catch (e) {
                    console.warn('checkout storefront unavailable', e);
                }
            }
        })();
    </script>
</body>

</html>
