<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }} | Mega CRM</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

      :root {
        --bg: #f5f7fb;
        --bg-accent: radial-gradient(circle at 0% 0%, #dbeafe, transparent 45%), radial-gradient(circle at 100% 100%, #fee2e2, transparent 45%);
        --panel: #ffffff;
        --panel-muted: #f8fafc;
        --text: #111827;
        --muted: #64748b;
        --primary: #0f766e;
        --primary-soft: #ccfbf1;
        --danger: #b91c1c;
        --border: #e2e8f0;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        color: var(--text);
        background: var(--bg);
        background-image: var(--bg-accent);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 260px 1fr;
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
        color: #f8fafc;
        padding: 20px 16px;
        position: sticky;
        top: 0;
        height: 100vh;
      }

      .brand {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.4px;
        margin-bottom: 6px;
      }

      .brand small {
        display: block;
        font-size: 11px;
        letter-spacing: 1.1px;
        text-transform: uppercase;
        color: #94a3b8;
      }

      .nav {
        margin-top: 18px;
        display: grid;
        gap: 6px;
      }

      .nav a {
        text-decoration: none;
        color: #cbd5e1;
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s ease;
      }

      .nav a:hover,
      .nav a.active {
        background: rgba(15, 118, 110, 0.35);
        color: #ecfeff;
      }

      .sidebar-actions {
        margin-top: 16px;
        display: grid;
        gap: 8px;
      }

      .sidebar-actions button {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
      }

      .main {
        padding: 24px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
      }

      .header .meta {
        color: var(--muted);
        font-size: 13px;
      }

      .panel {
        margin-top: 18px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .panel + .panel {
        margin-top: 14px;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .grid.cols-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .grid.cols-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .kpi {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        background: var(--panel-muted);
      }

      .kpi strong {
        display: block;
        font-size: 24px;
        margin-top: 6px;
      }

      .kpi span {
        color: var(--muted);
        font-size: 12px;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      th,
      td {
        border-bottom: 1px solid var(--border);
        padding: 10px;
        text-align: left;
        font-size: 13px;
      }

      th {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--muted);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        background: var(--primary-soft);
        color: var(--primary);
      }

      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      input,
      select,
      textarea,
      button {
        font-family: inherit;
      }

      input,
      select,
      textarea {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        background: #fff;
      }

      button.primary {
        border: 0;
        background: var(--primary);
        color: white;
        border-radius: 10px;
        padding: 9px 12px;
        cursor: pointer;
        font-weight: 600;
      }

      button.ghost {
        border: 1px solid var(--border);
        background: white;
        color: var(--text);
        border-radius: 10px;
        padding: 9px 12px;
        cursor: pointer;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          height: auto;
        }

        .grid.cols-4,
        .grid.cols-3 {
          grid-template-columns: 1fr;
        }

        .main {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">Mega CRM <small>Sales Intelligence</small></div>
        <nav class="nav">
          <a href="/crm/dashboard" data-nav="dashboard">Dashboard</a>
          <a href="/crm/contacts" data-nav="contacts">Contacts</a>
          <a href="/crm/deals" data-nav="deals">Deals</a>
          <a href="/crm/tasks" data-nav="tasks">Tasks</a>
          <a href="/crm/conversations" data-nav="conversations">Conversations</a>
          <a href="/crm/automations" data-nav="automations">Automations</a>
          <a href="/crm/reports" data-nav="reports">Reports</a>
          <a href="/crm/settings" data-nav="settings">Settings</a>
        </nav>
        <div class="sidebar-actions">
          <button id="btn-check-auth">Check Auth</button>
          <button id="btn-logout">Logout</button>
        </div>
      </aside>
      <main class="main">
        {% block content %}{% endblock %}
      </main>
    </div>

    <script>
      const navKey = "{{ page|default('dashboard') }}";
      document.querySelectorAll(".nav a").forEach((a) => {
        if (a.dataset.nav === navKey) a.classList.add("active");
      });

      const token = localStorage.getItem("crm_token");
      if (!token && !location.pathname.endsWith("/crm/login")) {
        location.href = "/crm/login";
      }

      const checkAuthBtn = document.getElementById("btn-check-auth");
      if (checkAuthBtn) {
        checkAuthBtn.addEventListener("click", () => {
          const user = JSON.parse(localStorage.getItem("crm_user") || "null");
          alert(user ? `Logged as ${user.email} (${user.role})` : "No user in session");
        });
      }

      const logoutBtn = document.getElementById("btn-logout");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", () => {
          localStorage.removeItem("crm_token");
          localStorage.removeItem("crm_user");
          localStorage.removeItem("crm_tenant_id");
          location.href = "/crm/login";
        });
      }

      window.crmFetch = async (path, options = {}) => {
        const token = localStorage.getItem("crm_token");
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        };
        if (token) headers.Authorization = `Bearer ${token}`;

        const res = await fetch(`/api/crm${path}`, {
          ...options,
          headers,
        });

        if (res.status === 401 && !location.pathname.endsWith("/crm/login")) {
          localStorage.removeItem("crm_token");
          location.href = "/crm/login";
          return null;
        }

        return res;
      };
    </script>
  </body>
</html>
