<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso · Entrenamiento Ferretería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh;
        display: flex; align-items: center; justify-content: center;
        background: #F7F8FA;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 14px; color: #0F1117;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        background: #fff; border: 1px solid #E4E6EA;
        border-radius: 20px; box-shadow: 0 4px 24px rgba(15,17,23,.08);
        padding: 40px 36px; width: 100%; max-width: 380px;
        margin: 24px;
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        margin-bottom: 28px; justify-content: center;
      }
      .brand-icon {
        width: 36px; height: 36px; border-radius: 8px;
        background: #D6440D; color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px;
      }
      .brand-name { font-size: 16px; font-weight: 700; }
      .brand-sub  { font-size: 13px; color: #5C6370; font-weight: 500; margin-top: 2px; }
      .field { display: grid; gap: 5px; margin-bottom: 14px; }
      .field label { font-size: 12.5px; font-weight: 600; color: #5C6370; }
      .field input {
        width: 100%; padding: 9px 12px;
        border: 1px solid #E4E6EA; border-radius: 10px;
        font-family: inherit; font-size: 14px; color: #0F1117;
        background: #fff; transition: border-color .15s, box-shadow .15s;
      }
      .field input:focus {
        outline: none; border-color: #D6440D;
        box-shadow: 0 0 0 3px rgba(214,68,13,.1);
      }
      .btn {
        width: 100%; padding: 10px;
        background: #D6440D; color: #fff;
        border: none; border-radius: 10px;
        font-family: inherit; font-size: 14px; font-weight: 600;
        cursor: pointer; margin-top: 6px;
        transition: background .15s;
      }
      .btn:hover { background: #B83A0B; }
      .error {
        background: #FEF2F2; border: 1px solid #FECACA;
        color: #991B1B; border-radius: 10px;
        padding: 10px 14px; font-size: 13px;
        margin-bottom: 16px;
      }
      .note { text-align: center; color: #9CA3AF; font-size: 12px; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-icon">🔧</div>
        <div>
          <div class="brand-name">Ferretería</div>
          <div class="brand-sub">Panel de entrenamiento</div>
        </div>
      </div>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post">
        <input type="hidden" name="next" value="{{ next or '' }}">
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autofocus autocomplete="current-password">
        </div>
        <button type="submit" class="btn">Entrar</button>
      </form>

      <div class="note">Uso interno · Solo equipo autorizado</div>
    </div>
  </body>
</html>
