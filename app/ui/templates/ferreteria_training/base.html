<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Entrenamiento · Ferretería" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* ── Design Tokens ───────────────────────────────────────────── */
      :root {
        --bg:            #F7F8FA;
        --surface:       #FFFFFF;
        --surface-alt:   #F3F4F6;
        --border:        #E4E6EA;
        --border-strong: #CDD1D8;

        --ink:           #0F1117;
        --ink-muted:     #5C6370;
        --ink-subtle:    #9CA3AF;

        --accent:        #D6440D;
        --accent-hover:  #B83A0B;
        --accent-bg:     #FFF3EE;
        --accent-border: #FBCBB8;

        --good:          #0A7C52;
        --good-bg:       #ECFDF5;
        --good-border:   #6EE7B7;

        --warn:          #92400E;
        --warn-bg:       #FFFBEB;
        --warn-border:   #FCD34D;

        --bad:           #991B1B;
        --bad-bg:        #FEF2F2;
        --bad-border:    #FECACA;

        --chat-bg:       #F0F2F5;

        --shadow-xs: 0 1px 2px rgba(15,17,23,.05);
        --shadow-sm: 0 1px 3px rgba(15,17,23,.08), 0 1px 2px -1px rgba(15,17,23,.06);
        --shadow-md: 0 4px 8px -1px rgba(15,17,23,.08), 0 2px 4px -2px rgba(15,17,23,.05);

        --r-sm:   6px;
        --r:      10px;
        --r-lg:   14px;
        --r-xl:   18px;
        --r-full: 9999px;
      }

      /* ── Dark Theme ──────────────────────────────────────────────── */
      [data-theme="dark"] {
        --bg:            #0F1117;
        --surface:       #1A1D25;
        --surface-alt:   #22262F;
        --border:        #2D3140;
        --border-strong: #3E4455;

        --ink:           #E8EAF0;
        --ink-muted:     #8B909E;
        --ink-subtle:    #555B6B;

        --accent:        #E8582A;
        --accent-hover:  #D6440D;
        --accent-bg:     #2A1810;
        --accent-border: #6B2A12;

        --good:          #10B981;
        --good-bg:       #0A2018;
        --good-border:   #065F46;

        --warn:          #FBBF24;
        --warn-bg:       #231B08;
        --warn-border:   #78350F;

        --bad:           #F87171;
        --bad-bg:        #200A0A;
        --bad-border:    #7F1D1D;

        --chat-bg:       #12151C;

        --shadow-xs: 0 1px 2px rgba(0,0,0,.3);
        --shadow-sm: 0 1px 3px rgba(0,0,0,.35), 0 1px 2px -1px rgba(0,0,0,.25);
        --shadow-md: 0 4px 8px -1px rgba(0,0,0,.4), 0 2px 4px -2px rgba(0,0,0,.3);
      }

      /* Smooth transitions when switching theme */
      body { transition: background .2s, color .2s; }

      /* ── Reset ───────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: "Inter", system-ui, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* ── App Shell ───────────────────────────────────────────────── */
      .app-header {
        position: sticky; top: 0; z-index: 50;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        box-shadow: var(--shadow-xs);
      }
      .app-header-inner {
        max-width: 1520px; margin: 0 auto;
        padding: 0 24px;
        display: flex; align-items: center; justify-content: space-between;
        height: 56px; gap: 20px;
      }
      .app-brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 700; font-size: 15px; color: var(--ink); text-decoration: none;
        flex-shrink: 0;
      }
      .app-brand:hover { text-decoration: none; }
      .brand-icon {
        width: 32px; height: 32px; border-radius: var(--r-sm);
        background: var(--accent); color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; flex-shrink: 0;
      }
      .brand-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
      .brand-section { font-size: 13px; font-weight: 500; color: var(--ink-muted); }

      .app-nav { display: flex; align-items: center; gap: 2px; flex: 1; }
      .app-nav a {
        display: flex; align-items: center; gap: 6px;
        padding: 7px 12px; border-radius: var(--r);
        font-size: 13.5px; font-weight: 500; color: var(--ink-muted);
        text-decoration: none; white-space: nowrap;
        transition: color .15s, background .15s;
      }
      .app-nav a:hover { color: var(--ink); background: var(--surface-alt); text-decoration: none; }
      .app-nav a.is-active { color: var(--accent); background: var(--accent-bg); }

      .app-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

      .shell { max-width: 1520px; margin: 0 auto; padding: 28px 24px; }

      /* ── Page Header ─────────────────────────────────────────────── */
      .page-header { margin-bottom: 24px; }
      .page-header h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
      .page-header .subtitle { color: var(--ink-muted); font-size: 13.5px; }

      /* ── Hero Banner ─────────────────────────────────────────────── */
      .page-hero {
        display: grid; gap: 10px;
        padding: 20px 24px;
        border-radius: var(--r-xl);
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        margin-bottom: 20px;
      }
      .page-hero h1, .page-hero h2 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
      .page-hero .lead { color: var(--ink-muted); line-height: 1.6; max-width: 860px; font-size: 13.5px; }
      .hero-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .hero-note {
        padding: 7px 12px; border-radius: var(--r-lg);
        background: var(--surface-alt); border: 1px solid var(--border);
        color: var(--ink-muted); font-size: 12.5px;
      }

      /* ── Cards ───────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-xl);
        box-shadow: var(--shadow-sm);
      }
      .card-pad { padding: 20px; }

      /* ── Layouts ─────────────────────────────────────────────────── */
      .workspace-layout { display: grid; grid-template-columns: minmax(0, 1.6fr) 380px; gap: 20px; align-items: start; }
      .grid-3 { display: grid; grid-template-columns: 280px minmax(0, 1fr) 360px; gap: 20px; align-items: start; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      .stack { display: grid; gap: 16px; }
      .stack-sm { display: grid; gap: 8px; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .summary-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); margin-bottom: 20px; }
      .tool-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .preview-grid { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
      .form-grid { display: grid; gap: 12px; }
      .form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
      .workflow-list { display: grid; gap: 8px; }

      /* ── Metric Tiles ────────────────────────────────────────────── */
      .metric {
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--r-lg); padding: 14px 16px;
        box-shadow: var(--shadow-xs);
      }
      .metric strong { display: block; font-size: 26px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 2px; }
      .metric span { color: var(--ink-muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }

      /* ── Chips / Badges ──────────────────────────────────────────── */
      .chip {
        display: inline-flex; align-items: center; gap: 4px;
        padding: 3px 9px; border-radius: var(--r-full);
        font-size: 11.5px; font-weight: 600;
        border: 1px solid var(--border);
        background: var(--surface-alt); color: var(--ink-muted);
        white-space: nowrap; line-height: 1.4;
      }
      a.chip { text-decoration: none; transition: border-color .15s, background .15s; }
      a.chip:hover { border-color: var(--border-strong); background: var(--surface); color: var(--ink); }
      .chip.good   { color: var(--good);  border-color: var(--good-border);   background: var(--good-bg); }
      .chip.warn   { color: var(--warn);  border-color: var(--warn-border);   background: var(--warn-bg); }
      .chip.bad    { color: var(--bad);   border-color: var(--bad-border);    background: var(--bad-bg); }
      .chip.accent { color: var(--accent); border-color: var(--accent-border); background: var(--accent-bg); }
      a.chip.accent:hover { background: #FFE8DC; border-color: #F9A886; }

      /* ── Buttons ─────────────────────────────────────────────────── */
      button, input[type="submit"] {
        display: inline-flex; align-items: center; justify-content: center;
        gap: 6px; padding: 8px 16px;
        border-radius: var(--r); border: 1px solid transparent;
        font-family: inherit; font-size: 13.5px; font-weight: 600;
        cursor: pointer; white-space: nowrap; width: auto;
        transition: background .15s, box-shadow .15s, transform .1s;
        background: var(--ink); color: #fff;
        box-shadow: var(--shadow-xs);
      }
      button:active { transform: scale(.98); }
      button.secondary {
        background: var(--surface); color: var(--ink);
        border-color: var(--border);
      }
      button.secondary:hover { background: var(--surface-alt); border-color: var(--border-strong); }
      button.accent-btn { background: var(--accent); }
      button.accent-btn:hover { background: var(--accent-hover); }
      button.warning { background: #D97706; }
      button.warning:hover { background: #B45309; }
      button.danger { background: var(--bad); }
      button.danger:hover { background: #7F1D1D; }

      /* ── Forms ───────────────────────────────────────────────────── */
      form { display: grid; gap: 12px; }
      .field-block { display: grid; gap: 5px; }
      .field-block label { font-size: 12.5px; font-weight: 600; color: var(--ink-muted); }
      input, select, textarea {
        width: 100%; padding: 8px 12px;
        border: 1px solid var(--border); border-radius: var(--r);
        font-family: inherit; font-size: 13.5px; color: var(--ink);
        background: var(--surface);
        transition: border-color .15s, box-shadow .15s;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(214,68,13,.1);
      }
      textarea { min-height: 100px; resize: vertical; }
      label.inline-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
      label.inline-toggle input { width: auto; }

      /* ── Session Links ───────────────────────────────────────────── */
      .session-link {
        display: block; padding: 12px 14px;
        border: 1px solid var(--border); border-radius: var(--r-lg);
        background: var(--surface); text-decoration: none; color: inherit;
        transition: border-color .15s, box-shadow .15s;
      }
      .session-link:hover, .session-link.active {
        border-color: var(--accent-border);
        box-shadow: 0 0 0 2px var(--accent-bg);
        text-decoration: none;
      }

      /* ── Tool Cards ──────────────────────────────────────────────── */
      .tool-card {
        display: grid; gap: 6px; padding: 14px 16px;
        border: 1px solid var(--border); border-radius: var(--r-lg);
        background: var(--surface); text-decoration: none; color: inherit;
        transition: border-color .15s, box-shadow .15s;
      }
      .tool-card:hover { border-color: var(--accent-border); box-shadow: var(--shadow-sm); text-decoration: none; }
      .tool-card strong { font-size: 13.5px; font-weight: 600; }

      /* ── Chat Bubbles ────────────────────────────────────────────── */
      .chat { display: grid; gap: 12px; }
      .bubble {
        border-radius: var(--r-xl); padding: 12px 16px;
        border: 1px solid var(--border); background: var(--surface);
        font-size: 13.5px; line-height: 1.55; white-space: pre-wrap;
      }
      .bubble.user { background: #F0F9FF; border-color: #BAE6FD; margin-left: 40px; }
      .bubble.assistant { background: var(--surface); margin-right: 40px; }
      .bubble .meta {
        display: flex; flex-wrap: wrap; gap: 6px;
        align-items: center; margin-bottom: 8px;
        font-size: 11.5px; color: var(--ink-subtle);
      }
      .bubble .meta strong { color: var(--ink-muted); font-weight: 600; }
      .message-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
      .message-actions a, .message-actions button { text-decoration: none; }

      /* ── Preview Boxes ───────────────────────────────────────────── */
      .preview-box { padding: 12px 14px; border-radius: var(--r-lg); border: 1px solid var(--border); background: var(--surface); font-size: 13px; }
      .preview-box.before { background: #FFFBEB; border-color: var(--warn-border); }
      .preview-box.after  { background: var(--good-bg); border-color: var(--good-border); }

      /* ── Callouts ────────────────────────────────────────────────── */
      .callout { padding: 12px 14px; border-radius: var(--r-lg); border: 1px solid var(--accent-border); background: var(--accent-bg); font-size: 13px; }
      .callout.good { border-color: var(--good-border); background: var(--good-bg); }
      .callout.warn { border-color: var(--warn-border); background: var(--warn-bg); }

      /* ── Panels ──────────────────────────────────────────────────── */
      .panel-soft { background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 12px 14px; font-size: 13px; }
      .panel-soft strong { font-size: 12.5px; font-weight: 600; color: var(--ink-muted); display: block; margin-bottom: 4px; }

      /* ── Step Cards ──────────────────────────────────────────────── */
      .workflow-card { display: grid; gap: 8px; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--surface); }
      .workflow-card h3 { margin: 0; font-size: 14px; font-weight: 600; }
      .step-card { display: grid; gap: 6px; padding: 12px 14px; border-radius: var(--r-lg); border: 1px solid var(--border); background: var(--surface-alt); font-size: 13px; }
      .step-number {
        display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; border-radius: var(--r-full);
        background: var(--accent-bg); color: var(--accent);
        font-weight: 700; font-size: 12px; flex-shrink: 0;
        border: 1px solid var(--accent-border);
      }

      /* ── Success/Error Banners ───────────────────────────────────── */
      .success-banner { padding: 14px 16px; border-radius: var(--r-lg); border: 1px solid var(--good-border); background: var(--good-bg); font-size: 13px; }
      .error { color: var(--bad); background: var(--bad-bg); border: 1px solid var(--bad-border); border-radius: var(--r-lg); padding: 12px 14px; font-size: 13px; }

      /* ── Review Highlight ────────────────────────────────────────── */
      .review-target { border-color: var(--accent-border) !important; box-shadow: 0 0 0 2px var(--accent-bg); }
      .review-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }

      /* ── Table ───────────────────────────────────────────────────── */
      .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--r-xl); background: var(--surface); }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 13px; }
      th { font-size: 11.5px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; background: var(--surface-alt); }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: var(--surface-alt); }

      /* ── Typography ──────────────────────────────────────────────── */
      .section-title { font-size: 15px; font-weight: 700; margin: 0 0 6px; letter-spacing: -.01em; }
      .caption { font-size: 11.5px; color: var(--ink-subtle); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }
      .muted  { color: var(--ink-muted); }
      .help   { color: var(--ink-muted); font-size: 12.5px; line-height: 1.55; }
      .subtle-link { color: var(--ink-muted); font-size: 13px; font-weight: 500; }
      .subtle-link:hover { color: var(--ink); }

      /* ── Misc ────────────────────────────────────────────────────── */
      .empty {
        padding: 28px; text-align: center; color: var(--ink-subtle);
        border: 1.5px dashed var(--border); border-radius: var(--r-xl);
        background: var(--surface); font-size: 13.5px;
      }
      .progress { height: 6px; background: var(--surface-alt); border-radius: var(--r-full); overflow: hidden; border: 1px solid var(--border); }
      .progress > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent-border), var(--accent)); border-radius: var(--r-full); }
      .domain-panel { display: none; }
      .domain-panel.is-active { display: grid; gap: 12px; }
      details.technical, details.subsection { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--surface-alt); padding: 10px 14px; }
      details.technical summary, details.subsection summary { cursor: pointer; font-weight: 600; font-size: 13px; color: var(--ink-muted); }
      details[open] summary { color: var(--ink); }
      .list-clean { display: grid; gap: 8px; margin: 0; padding-left: 18px; }

      /* ── Responsive ──────────────────────────────────────────────── */
      @media (max-width: 1180px) {
        .grid-3, .workspace-layout { grid-template-columns: 1fr; }
        .bubble.user, .bubble.assistant { margin: 0; }
      }
      @media (max-width: 860px) {
        .grid-2, .form-grid.cols-2, .preview-grid { grid-template-columns: 1fr; }
        .app-header-inner { padding: 0 16px; }
        .shell { padding: 20px 16px; }
      }
      @media (max-width: 640px) {
        .summary-grid { grid-template-columns: 1fr 1fr; }
        .app-nav a span { display: none; }
      }
    </style>
  </head>
  <body>

    <!-- ── App Header ──────────────────────────────────────────────── -->
    <header class="app-header">
      <div class="app-header-inner">

        <a class="app-brand" href="/ops/ferreteria/training">
          <div class="brand-icon">🔧</div>
          <span>Ferretería</span>
          <div class="brand-divider"></div>
          <span class="brand-section">Entrenamiento</span>
        </a>

        <nav class="app-nav">
          <a href="/ops/ferreteria/training"
             class="{% if request.path in ['/ops/ferreteria/training', '/ops/ferreteria/training/sandbox'] %}is-active{% endif %}">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 2v4l3 3"/><circle cx="8" cy="8" r="6"/></svg>
            Hablar con el bot
          </a>
          <a href="/ops/ferreteria/training/suggestions?queue=approved"
             class="{% if request.path == '/ops/ferreteria/training/suggestions' and request.args.get('queue', 'approved') == 'approved' and not request.args.get('status') and not request.args.get('domain') %}is-active{% endif %}">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8l3 3 7-7"/></svg>
            Cambios listos
          </a>
          <a href="/ops/ferreteria/training/tools"
             class="{% if request.path in ['/ops/ferreteria/training/tools', '/ops/ferreteria/training/help', '/ops/ferreteria/training/usage', '/ops/ferreteria/training/unresolved-terms', '/ops/ferreteria/training/impact', '/ops/ferreteria/training/sessions', '/ops/ferreteria/training/cases'] or (request.path == '/ops/ferreteria/training/suggestions' and request.args.get('queue') != 'approved') %}is-active{% endif %}">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="1.5"/><circle cx="3" cy="8" r="1.5"/><circle cx="13" cy="8" r="1.5"/></svg>
            Más herramientas
          </a>
        </nav>

        <div class="app-header-right">
          <a class="subtle-link" href="/ops/ferreteria/training/help">Ayuda</a>
          <span class="chip accent">Uso interno</span>
          <button id="theme-toggle" onclick="toggleTheme()" title="Cambiar tema"
            style="background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 10px;font-size:16px;cursor:pointer;color:var(--ink-muted);box-shadow:none;min-width:unset;width:auto;">
            🌙
          </button>
          <a href="/ops/ferreteria/training/logout" class="chip" style="color:var(--ink-muted);">Salir</a>
        </div>

      </div>
    </header>

    <!-- ── Page Content ────────────────────────────────────────────── -->
    <main>
      <div class="shell">
        {% block content %}{% endblock %}
      </div>
    </main>

  <script>
    // ── Dark / Light Theme Toggle ─────────────────────────────────
    (function() {
      var saved = localStorage.getItem("theme") ||
                  (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      applyTheme(saved);
    })();

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      var btn = document.getElementById("theme-toggle");
      if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
      localStorage.setItem("theme", theme);
    }

    function toggleTheme() {
      var current = document.documentElement.getAttribute("data-theme") || "light";
      applyTheme(current === "dark" ? "light" : "dark");
    }
  </script>
  </body>
</html>
