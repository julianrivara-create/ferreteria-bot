<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ store_name or 'Salesbot' }} Dashboard{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        body {
            background: #f8f9fa;
        }

        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .sidebar .nav-link {
            color: rgba(255, 255, 255, .85);
            font-weight: 500;
            padding: 12px 20px;
            transition: all 0.3s;
        }

        .sidebar .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, .1);
        }

        .sidebar .nav-link.active {
            color: #fff;
            background: rgba(255, 255, 255, .2);
            border-left: 4px solid #fff;
        }

        .sidebar .nav-link i {
            margin-right: 8px;
        }

        main {
            margin-left: 250px;
            padding: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 12px rgba(0, 0, 0, .12);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
        }

        .navbar {
            box-shadow: 0 2px 4px rgba(0, 0, 0, .08);
        }

        .btn-logout {
            background: rgba(102, 126, 234, .1);
            color: #667eea;
            border: none;
        }

        .btn-logout:hover {
            background: rgba(102, 126, 234, .2);
            color: #667eea;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top" style="margin-left: 250px;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">{% block page_title %}Dashboard{% endblock %}</span>
            <div class="d-flex">
                <span class="navbar-text me-3">
                    <i class="bi bi-person-circle"></i> {{ session.username or 'Admin' }}
                </span>
                <a href="{{ url_for('dashboard.logout') }}" class="btn btn-sm btn-logout">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </a>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <div class="sidebar col-md-3 col-lg-2 d-md-block" style="width: 250px;">
        <div class="px-3 py-2">
            <h5 class="text-white text-center mb-4">
                <i class="bi bi-robot"></i> {{ store_name or 'Salesbot' }}
            </h5>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link {% if request.path.endswith('/t/' ~ tenant_slug) %}active{% endif %}"
                    href="{{ url_for('dashboard.index_tenant', tenant_slug=tenant_slug) }}">
                    <i class="bi bi-house-door"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.path.endswith('/t/' ~ tenant_slug ~ '/sales') %}active{% endif %}"
                    href="{{ url_for('dashboard.sales_page', tenant_slug=tenant_slug) }}">
                    <i class="bi bi-cart-check"></i> Ventas
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.path.endswith('/t/' ~ tenant_slug ~ '/products') %}active{% endif %}"
                    href="{{ url_for('dashboard.products_page', tenant_slug=tenant_slug) }}">
                    <i class="bi bi-box-seam"></i> Productos
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if request.path.endswith('/t/' ~ tenant_slug ~ '/conversations') %}active{% endif %}"
                    href="{{ url_for('dashboard.conversations_page', tenant_slug=tenant_slug) }}">
                    <i class="bi bi-chat-dots"></i> Conversaciones
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4" style="margin-top: 56px;">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
