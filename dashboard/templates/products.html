{% extends "base.html" %}

{% block page_title %}Productos{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>📦 Productos</h2>
    </div>
</div>

<div class="chart-container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>Catálogo de Productos</h5>
        <input type="text" class="form-control form-control-sm" style="max-width: 300px;" id="searchInput"
            placeholder="Buscar...">
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>SKU</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio (ARS)</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="productsTable">
                <tr>
                    <td colspan="6" class="text-center">Cargando...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let allProducts = [];
    const TENANT_SLUG = "{{ tenant_slug }}";
    const DASH_API = `/dashboard/api/t/${TENANT_SLUG}`;

    async function loadProducts() {
        const response = await fetch(`${DASH_API}/products`);
        allProducts = await response.json();
        renderProducts(allProducts);
    }

    function renderProducts(products) {
        const tbody = document.getElementById('productsTable');
        tbody.innerHTML = '';

        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center">No hay productos</td></tr>';
            return;
        }

        products.forEach(product => {
            const stockBadge = product.stock > 10
                ? `<span class="badge bg-success">${product.stock}</span>`
                : product.stock > 0
                    ? `<span class="badge bg-warning">${product.stock}</span>`
                    : `<span class="badge bg-danger">0</span>`;

            const row = `
            <tr>
                <td>${product.sku}</td>
                <td>${product.name || product.model || 'N/A'}</td>
                <td>${product.category}</td>
                <td>$${parseInt(product.price_ars || 0).toLocaleString()}</td>
                <td>${stockBadge}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="editProduct('${product.sku}')">
                        <i class="bi bi-pencil"></i>
                    </button>
                </td>
            </tr>
        `;
            tbody.innerHTML += row;
        });
    }

    function editProduct(sku) {
        alert(`Editar producto ${sku} (Implementar modal)`);
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p =>
            (p.sku && p.sku.toLowerCase().includes(query)) ||
            (p.name && p.name.toLowerCase().includes(query)) ||
            (p.model && p.model.toLowerCase().includes(query)) ||
            (p.category && p.category.toLowerCase().includes(query))
        );
        renderProducts(filtered);
    });

    // Init
    loadProducts();
</script>
{% endblock %}
