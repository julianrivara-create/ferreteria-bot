{% extends "base.html" %}

{% block page_title %}Conversaciones{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>💬 Conversaciones</h2>
    </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="chart-container">
            <h6>Sesiones Recientes</h6>
            <div class="list-group" id="sessionsList">
                <a href="#" class="list-group-item list-group-item-action">
                    Cargando...
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-8">
        <div class="chart-container">
            <h6>Conversación</h6>
            <div id="conversationDetail">
                <p class="text-muted text-center">Seleccioná una conversación</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let sessions = [];
    const TENANT_SLUG = "{{ tenant_slug }}";
    const DASH_API = `/dashboard/api/t/${TENANT_SLUG}`;

    async function loadSessions() {
        const response = await fetch(`${DASH_API}/conversations`);
        sessions = await response.json();
        renderSessions();
    }

    function renderSessions() {
        const list = document.getElementById('sessionsList');
        list.innerHTML = '';

        if (sessions.length === 0) {
            list.innerHTML = `
            <a href="#" class="list-group-item list-group-item-action disabled">
                Sin conversaciones registradas
            </a>`;
            return;
        }

        sessions.forEach((session, idx) => {
            const item = `
            <a href="#" class="list-group-item list-group-item-action" onclick="loadConversation('${session.session_id}'); return false;">
                <div class="d-flex w-100 justify-content-between">
                    <h6 class="mb-1">${session.session_id.substring(0, 12)}...</h6>
                    <small>${session.message_count} msg</small>
                </div>
                <small>${session.last_message ? new Date(session.last_message).toLocaleString() : '-'}</small>
            </a>
        `;
            list.innerHTML += item;
        });
    }

    async function loadConversation(sessionId) {
        const response = await fetch(`${DASH_API}/conversations/${sessionId}`);
        const messages = await response.json();

        const detail = document.getElementById('conversationDetail');
        detail.innerHTML = '<div class="p-3" style="max-height: 600px; overflow-y: auto;">';

        messages.forEach(msg => {
            let parsed = msg.message;
            if (typeof msg.message === 'string') {
                try {
                    parsed = JSON.parse(msg.message);
                } catch (e) {
                    parsed = { role: 'assistant', content: msg.message };
                }
            }
            const role = parsed.role || 'unknown';
            const content = parsed.content || '';

            const isUser = role === 'user';
            const bubbleClass = isUser ? 'bg-primary text-white' : 'bg-light';
            const alignClass = isUser ? 'text-end' : '';

            const bubble = `
            <div class="${alignClass} mb-2">
                <div class="d-inline-block ${bubbleClass} rounded p-2" style="max-width: 70%;">
                    <small class="d-block text-muted mb-1">${isUser ? 'Usuario' : 'Bot'}</small>
                    ${content}
                </div>
            </div>
        `;
            detail.innerHTML += bubble;
        });

        detail.innerHTML += '</div>';
    }

    // Init
    loadSessions();
</script>
{% endblock %}
