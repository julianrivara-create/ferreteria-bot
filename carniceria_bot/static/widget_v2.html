<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Sales Bot</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js for reactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .message-enter {
            animation: slideUp 0.3s ease-out;
        }

        .typing-indicator span {
            animation: pulse 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Scrollbar personalizado */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Smooth scroll */
        .messages-container {
            scroll-behavior: smooth;
        }

        /* Gradient animation */
        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .gradient-animated {
            background-size: 200% 200%;
            animation: gradient 3s ease infinite;
        }
    </style>
</head>

<body class="bg-gray-50">

    <div x-data="chatWidget()" class="min-h-screen flex items-center justify-center p-4">

        <!-- Chat Container -->
        <div class="w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden">

            <!-- Header -->
            <div class="bg-gradient-to-r from-purple-600 via-purple-500 to-indigo-600 gradient-animated p-6 text-white">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-white/20 backdrop-blur rounded-full flex items-center justify-center">
                            <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z" />
                                <path
                                    d="M15 7v2a4 4 0 01-4 4H9.828l-1.766 1.767c.28.149.599.233.938.233h2l3 3v-3h2a2 2 0 002-2V9a2 2 0 00-2-2h-1z" />
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold">Sales Bot</h1>
                            <p class="text-sm text-white/80 flex items-center">
                                <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
                                En línea
                            </p>
                        </div>
                    </div>
                    <button @click="darkMode = !darkMode" class="p-2 hover:bg-white/10 rounded-lg transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Messages -->
            <div class="messages-container h-96 overflow-y-auto p-6 space-y-4 bg-gray-50">

                <!-- Welcome Message -->
                <div class="flex justify-start message-enter">
                    <div class="max-w-xs bg-white rounded-2xl rounded-tl-none shadow-md p-4">
                        <p class="text-sm text-gray-700">
                            👋 ¡Hola! Soy tu asistente de ventas. ¿En qué puedo ayudarte hoy?
                        </p>
                        <span class="text-xs text-gray-400 mt-2 block">Ahora</span>
                    </div>
                </div>

                <!-- Dynamic Messages -->
                <template x-for="(msg, index) in messages" :key="index">
                    <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'" class="message-enter">
                        <div :class="msg.role === 'user' 
                            ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-2xl rounded-tr-none' 
                            : 'bg-white text-gray-700 rounded-2xl rounded-tl-none shadow-md'"
                            class="max-w-xs p-4 transition-all hover:scale-105">

                            <p class="text-sm" x-text="msg.content"></p>
                            <span class="text-xs mt-2 block"
                                :class="msg.role === 'user' ? 'text-white/70' : 'text-gray-400'" x-text="msg.time">
                            </span>

                            <!-- Read receipt for user messages -->
                            <span x-show="msg.role === 'user'" class="text-xs text-white/70 flex items-center mt-1">
                                <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                    <path
                                        d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" />
                                </svg>
                                Visto
                            </span>
                        </div>
                    </div>
                </template>

                <!-- Typing Indicator -->
                <div x-show="isTyping" class="flex justify-start message-enter">
                    <div class="bg-white rounded-2xl rounded-tl-none shadow-md p-4 typing-indicator flex space-x-2">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    </div>
                </div>

            </div>

            <!-- Input Area -->
            <div class="p-4 bg-white border-t border-gray-200">
                <form @submit.prevent="sendMessage" class="flex items-center space-x-2">

                    <!-- File upload button -->
                    <button type="button"
                        class="p-3 text-gray-500 hover:text-purple-600 hover:bg-purple-50 rounded-xl transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                        </svg>
                    </button>

                    <!-- Input -->
                    <input type="text" x-model="currentMessage" @keydown.enter="sendMessage"
                        placeholder="Escribí tu mensaje..."
                        class="flex-1 px-4 py-3 bg-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-600 transition" />

                    <!-- Send button -->
                    <button type="submit" :disabled="!currentMessage.trim()" :class="currentMessage.trim() 
                            ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white hover:shadow-lg' 
                            : 'bg-gray-300 text-gray-500 cursor-not-allowed'"
                        class="p-3 rounded-xl transition transform hover:scale-105">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </form>

                <!-- Powered by -->
                <div class="mt-2 text-center">
                    <span class="text-xs text-gray-400">Powered by Sales Bot AI</span>
                </div>
            </div>

        </div>

    </div>

    <script>
        function chatWidget() {
            return {
                messages: [],
                currentMessage: '',
                isTyping: false,
                darkMode: false,
                sessionId: 'web_' + Date.now(),

                init() {
                    // Auto scroll to bottom
                    this.$nextTick(() => {
                        this.scrollToBottom();
                    });
                },

                async sendMessage() {
                    if (!this.currentMessage.trim()) return;

                    const userMsg = {
                        role: 'user',
                        content: this.currentMessage,
                        time: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
                    };

                    this.messages.push(userMsg);
                    const message = this.currentMessage;
                    this.currentMessage = '';

                    this.$nextTick(() => this.scrollToBottom());

                    // Show typing indicator
                    this.isTyping = true;

                    try {
                        // Call backend API
                        const response = await fetch('http://localhost:8080/chat/message', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                session_id: this.sessionId,
                                message: message
                            })
                        });

                        const data = await response.json();

                        // Simulate typing delay
                        await new Promise(resolve => setTimeout(resolve, 500));

                        this.isTyping = false;

                        const botMsg = {
                            role: 'bot',
                            content: data.response || 'Lo siento, no pude procesar tu mensaje.',
                            time: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
                        };

                        this.messages.push(botMsg);
                        this.$nextTick(() => this.scrollToBottom());

                        // Play notification sound (optional)
                        this.playNotification();

                    } catch (error) {
                        console.error('Error:', error);
                        this.isTyping = false;

                        // Fallback message
                        const errorMsg = {
                            role: 'bot',
                            content: 'Ups, hubo un error. ¿Podés intentar de nuevo?',
                            time: new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
                        };

                        this.messages.push(errorMsg);
                        this.$nextTick(() => this.scrollToBottom());
                    }
                },

                scrollToBottom() {
                    const container = document.querySelector('.messages-container');
                    if (container) {
                        container.scrollTop = container.scrollHeight;
                    }
                },

                playNotification() {
                    // Optional: play sound
                    // const audio = new Audio('/notification.mp3');
                    // audio.play();
                }
            }
        }
    </script>
</body>

</html>
