[pytest]
testpaths =
    tests
    bot_sales/tests
norecursedirs =
    carniceria
    carniceria_bot
    archive
    .venv
    venv
addopts = -ra --import-mode=importlib
markers =
    slow: marks tests that make real LLM API calls (deselect with -m "not slow")
filterwarnings =
    ignore:unclosed database in <sqlite3\.Connection object.*:ResourceWarning
