entries:
- id: envios
  question: Como manejan envios y retiros
  answer: Hacemos retiro por mostrador sin costo y envios en moto o transporte. La
    demora habitual es de 24 a 72 horas habiles segun zona.
  keywords:
  - envio
  - envios
  - retiro
  - retirar
  - moto
  - transporte
  - despacho
  active: true
  tags:
  - logistica
- id: pagos
  question: Que medios de pago aceptan
  answer: Aceptamos efectivo, transferencia, MercadoPago y tarjetas. Para operaciones
    grandes confirmamos la condicion comercial antes de cerrar.
  keywords:
  - pago
  - pagos
  - tarjeta
  - transferencia
  - mercadopago
  - efectivo
  - cuotas
  active: true
  tags:
  - pagos
- id: facturacion
  question: Hacen factura A o B
  answer: Si, podemos emitir factura A o B. Si necesitas factura A o una condicion
    especial, pasame los datos y lo confirmamos.
  keywords:
  - factura
  - factura a
  - factura b
  - cuit
  - afip
  active: true
  tags:
  - facturacion
- id: cambios
  question: Como funcionan cambios y devoluciones
  answer: Aceptamos cambios dentro de 10 dias corridos con ticket o factura, siempre
    que el producto este sin uso y en su empaque original.
  keywords:
  - cambio
  - cambios
  - devolucion
  - devoluciones
  - devolver
  active: true
  tags:
  - postventa
- id: garantia
  question: Que garantia tienen las herramientas
  answer: Las herramientas y productos con garantia de fabricante respetan la cobertura
    oficial. Si hay una falla, te derivamos a postventa para resolverlo.
  keywords:
  - garantia
  - falla
  - postventa
  - service
  - servicio tecnico
  active: true
  tags:
  - postventa
- id: horario
  question: Cual es el horario de atencion
  answer: Atendemos de lunes a viernes de 8:00 a 18:00 y los sabados de 8:30 a 13:00.
  keywords:
  - horario
  - abren
  - atienden
  - sabado
  - lunes
  - viernes
  active: true
  tags:
  - atencion
- id: factura_a_demo
  question: ¿Hacen factura A?
  answer: Sí, hacemos factura A. Si querés avanzar, pasanos CUIT y razón social junto
    con el pedido.
  keywords:
  - factura a
  - cuit
  - razon social
  active: true
  tags:
  - facturacion
  - politica
